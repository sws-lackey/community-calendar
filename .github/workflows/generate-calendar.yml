        curl -sL "https://tockify.com/api/feeds/ics/bloomington.arts.calendar" -o bloomington_arts.ics || true
        # IU LiveWhale feeds
        curl -sL "https://events.iu.edu/live/ical/events/group_id/56" -o iu_jacobs_music.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/378" -o iu_auditorium.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/234" -o iu_eskenazi_museum.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/81" -o iu_cinema.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/59" -o iu_la_casa.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/64" -o iu_maurer_law.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/343" -o iu_kelley_business.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/130" -o iu_arts_humanities.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/261" -o iu_libraries.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/218" -o iu_theatre_dance.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/314" -o iu_asian_culture.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/275" -o iu_first_nations.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/237" -o iu_lgbtq_culture.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/221" -o iu_black_film.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/235" -o iu_neal_marshall.ics || true
        curl -sL "https://events.iu.edu/live/ical/events/group_id/135" -o iu_hamilton_lugar.ics || true
        # B-Square Bulletin Google Calendars
        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_35a6qiaiperdn7b1r6v2ksjlig@group.calendar.google.com/public/basic.ics" -o bsquare_government.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/4dj0guhji982ca5k90ljeliul0@group.calendar.google.com/public/basic.ics" -o bsquare_misc_civic.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/2gd73d7gc46mstrdnr6k7v7b2o@group.calendar.google.com/public/basic.ics" -o bsquare_critical_mass.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/c_02o6fd3erhdmhe4oc5so149ir0@group.calendar.google.com/public/basic.ics" -o bsquare_bptc.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/d1087e97d4ace1c1ca2dd6336d417bea870ddac277be6d1711cbc0235aa85228%40group.calendar.google.com/public/basic.ics" -o btonline_events.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/j6botrehcce8vobqe6vpb4hnhk%40group.calendar.google.com/public/basic.ics" -o btonline_food.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/2db8c2cf65a3558e38c4caaea43cb56e722090235237a95f137b087306353e51%40group.calendar.google.com/public/basic.ics" -o btonline_shopping.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_1rosks8nont4ebaq41tfgg8v7g@group.calendar.google.com/public/basic.ics" -o parks_and_rec.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/knobstone-hiking-trail-association-of-indiana-meetup/events/ical/" -o meetup_knobstone_hiking_trail_association_of_indiana_meetup.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/Bloomington-Atheists-and-Rationally-Awesome-People/events/ical/" -o meetup_bloomington_atheists_and_rationally_awesome_people.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_0l6e93fe54psagva4dhojra2q0@group.calendar.google.com/public/basic.ics" -o farmers_market.ics || true
        curl -sL "https://www.lotusfest.org/events/?ical=1" -o lotusfest.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/cuc66guoam1hhcqq2rnaniinl8%40group.calendar.google.com/public/basic.ics" -o calendar_cuc66guoam1hhcqq2rnaniinl8_40group_calend.ics || true
        # IU LibCal feeds
        curl -sL "https://iub.libcal.com/ical_subscribe.php?src=p&cid=5914" -o iu_libcal_screening_room.ics || true
        curl -sL "https://iub.libcal.com/ical_subscribe.php?src=p&cid=1228" -o iu_libcal_scholars_commons.ics || true
        # CampusLabs / beINvolved (student org events)
        curl -sL "https://iub.campuslabs.com/engage/events.ics" -o iu_campuslabs.ics || true
        # Community ICS feeds
        curl -sL "https://wonderlab.org/events/?ical=1" -o wonderlab.ics || true
        curl -sL "https://firstuc.org/events/?ical=1" -o first_united_church.ics || true
        curl -sL "https://www.bloomingtoncommunityband.org/events/?ical=1" -o community_band.ics || true
        curl -sL "https://browncountyplayhouse.org/events/?ical=1" -o brown_county_playhouse.ics || true
        curl -sL "https://uplandbeer.com/events/?ical=1" -o upland_brewing.ics || true
        # Google Calendar feeds
        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_r7b1mkrme1r8uhl3b5amhb50bc@group.calendar.google.com/public/basic.ics" -o city_boards_commissions.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/bloominglabs%40gmail.com/public/basic.ics" -o bloominglabs.ics || true
        # Meetup feeds (Board Games: 403 private; Remote Workers: dormant — removed 2026-03)

        curl -sL "https://calendar.google.com/calendar/ical/bloomington.in.gov_c657mi332p5sjpq2lcht9imu60%40group.calendar.google.com/public/basic.ics" -o calendar_bloomington_in_gov_c657mi332p5sjpq2lcht9i.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/shweekend%40gmail.com/public/basic.ics" -o calendar_shweekend_40gmail_com_public.ics || true
        curl -sL "https://writersguildbloomington.com/?plugin=all-in-one-event-calendar&controller=ai1ec_exporter_controller&action=export_events&no_html=true" -o writersguildbloomington.ics || true
        curl -sL "https://bloomspinweave.org/?post_type=tribe_events&ical=1&eventDisplay=list" -o bloomspinweave.ics || true
        curl -sL "https://www.hoosierflyfishers.com/events/list/?ical=1" -o hoosierflyfishers_list.ics || true
        curl -sL "https://calendar.google.com/calendar/ical/r5lf3al9blontcsjnedbr2f2u0%40group.calendar.google.com/public/basic.ics" -o calendar_r5lf3al9blontcsjnedbr2f2u0_40group_calend.ics || true
        cd ../..
        python scripts/enrich_meetup_images.py --dir cities/bloomington || true
        python scripts/enrich_meetup_images.py --any-url \
          cities/bloomington/buskirk_chumley.ics \
          cities/bloomington/comedy_attic.ics \
          cities/bloomington/the_bishop.ics \
          cities/bloomington/cicada_cinema.ics \
          cities/bloomington/peoples_market.ics \
          cities/bloomington/cardinal_spirits.ics \
          cities/bloomington/sassafras_audubon.ics \
          cities/bloomington/master_gardeners.ics \
          cities/bloomington/sycamore_land_trust.ics \
          cities/bloomington/songkick_bluebird.ics \
          cities/bloomington/songkick_blockhouse.ics || true
        python scripts/combine_ics.py --input-dir cities/bloomington --output cities/bloomington/combined.ics --name "Bloomington Community Calendar"

    # ==========================================
    # Davis
    # ==========================================
    - name: Scrape Davis sources
      if: contains(steps.locations.outputs.list, 'davis') && github.event.inputs.regenerate_only != 'true'
      run: |
        echo "Scraping Davis..."
        python scrapers/ucdavis_arts.py --output cities/davis/ucdavis_arts.ics || true
        python scrapers/ucdavis_library.py --output cities/davis/ucdavis_library.ics || true
        python scrapers/ucdavis_campusgroups.py --output cities/davis/ucdavis_campusgroups.ics || true
        python scrapers/davis_downtown.py --output cities/davis/davis_downtown.ics || true
        python scrapers/yolo_library.py --output cities/davis/yolo_library.ics || true
        python scrapers/uudavis.py --output cities/davis/uudavis.ics || true
        python cities/davis/scrapers/mondavi_center.py --output cities/davis/mondavi_center.ics || true
        python scrapers/davis_chamber.py --output cities/davis/davis_chamber.ics || true
        python scrapers/ucdavis_athletics.py --output cities/davis/ucdavis_athletics.ics || true
      continue-on-error: true

    - name: Download Davis Meetup feeds
      if: contains(steps.locations.outputs.list, 'davis')
      run: |
        cd cities/davis
        # Meetup groups
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/mosaics/events/ical/" -o meetup_mosaics.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/intercultural-mosaics/events/ical/" -o meetup_intercultural.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/yolo-county-board-game-gathering/events/ical/" -o meetup_board_games.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/pence-adult-art-programs/events/ical/" -o meetup_pence_art.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/art-in-action/events/ical/" -o meetup_art_in_action.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/mindful-embodied-spirituality/events/ical/" -o meetup_mindful.ics || true
        curl -sL -A "Mozilla/5.0" "https://www.meetup.com/winters-shut-up-and-write-meetup-group/events/ical/" -o meetup_winters_write.ics || true
        # tribe_events ICS feeds
        curl -sL -A "Mozilla/5.0" "https://thedirt.online/events/?ical=1" -o thedirt.ics || true
        curl -sL -A "Mozilla/5.0" "https://visitdavis.org/events/?ical=1" -o visitdavis.ics || true
        curl -sL -A "Mozilla/5.0" "https://visityolo.com/event/?ical=1" -o visityolo.ics || true
        curl -sL -A "Mozilla/5.0" "https://putahcreekcouncil.org/events/?ical=1" -o putahcreek.ics || true
        curl -sL -A "Mozilla/5.0" "https://hatefreetogether.org/events/?ical=1" -o hatefreetogether.ics || true
        # Google Calendar feeds
        curl -sL "https://calendar.google.com/calendar/ical/davisbikeclubwww%40gmail.com/public/basic.ics" -o davis_bike_club.ics || true
        cd ../..

    - name: Combine Davis ICS
      if: contains(steps.locations.outputs.list, 'davis')
      run: |
        python scripts/enrich_meetup_images.py --dir cities/davis || true
        python scripts/combine_ics.py --input-dir cities/davis --output cities/davis/combined.ics --name "Davis Community Calendar"

    # ==========================================
    # Petaluma
    # ==========================================
    - name: Scrape Petaluma sources
      if: contains(steps.locations.outputs.list, 'petaluma') && github.event.inputs.regenerate_only != 'true'
      run: |
